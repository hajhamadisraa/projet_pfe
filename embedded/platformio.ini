; ═══════════════════════════════════════════════════════
;  platformio.ini — Configuration projet ESP32
;  Ouvrez ce fichier à la racine dans VS Code + PlatformIO
; ═══════════════════════════════════════════════════════
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Vitesse upload
upload_speed = 921600

; Vitesse moniteur série
monitor_speed = 115200

; Filtre Serial Monitor : affiche seulement les lignes utiles
monitor_filters = esp32_exception_decoder, default

; ─────────────────────────────
;  Bibliothèques nécessaires
; ─────────────────────────────
lib_deps =
  ; JSON — pour construire/lire les messages JSON
  bblanchon/ArduinoJson @ ^6.21.5

  ; DHT — pour le capteur température/humidité (étape 4)
  adafruit/DHT sensor library @ ^1.4.6
  adafruit/Adafruit Unified Sensor @ ^1.1.9

  ; MQTT — pour la communication temps réel (étape 3)
  knolleary/PubSubClient @ ^2.8
  
  adafruit/DHT sensor library@^1.4.6
  adafruit/Adafruit Unified Sensor@^1.1.14